name: Day 12 CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  ci:
    name: Verify lab code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install final project dependencies
        working-directory: 06-lab-complete
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Lab 03 Render app
        run: python -m compileall 03-cloud-deployment/render

      - name: Compile final project
        working-directory: 06-lab-complete
        run: python -m compileall app utils

      - name: Run production readiness checker
        working-directory: 06-lab-complete
        run: python check_production_ready.py

      - name: Validate Docker Compose file
        working-directory: 06-lab-complete
        run: docker compose config

  cd-render:
    name: Trigger Render deploy
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

    steps:
      - name: Skip when deploy hook is not configured
        if: env.RENDER_DEPLOY_HOOK_URL == ''
        run: echo "RENDER_DEPLOY_HOOK_URL is not set; skipping Render deploy."

      - name: Trigger Render deploy hook
        if: env.RENDER_DEPLOY_HOOK_URL != ''
        run: |
          curl --fail --request POST "$RENDER_DEPLOY_HOOK_URL"
