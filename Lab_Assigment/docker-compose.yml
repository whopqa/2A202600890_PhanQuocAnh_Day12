services:
  # ── Redis (shared state store) ────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── Day08 Registry ────────────────────────────────────────────
  day08-registry:
    build: .
    command: ["python", "-m", "Lab_Assigment.day08_registry"]
    ports:
      - "11000:11000"
    environment:
      - DAY08_REGISTRY_PORT=11000
    env_file:
      - path: .env.local
        required: false
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:11000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── Day08 Legal RAG Agent ─────────────────────────────────────
  day08-legal-rag:
    build: .
    command: ["python", "-m", "Lab_Assigment.day08_legal_rag_agent"]
    ports:
      - "11012:11012"
    environment:
      - DAY08_LEGAL_RAG_AGENT_PORT=11012
      - DAY08_REGISTRY_URL=http://day08-registry:11000
    env_file:
      - path: .env.local
        required: false
    depends_on:
      day08-registry:
        condition: service_healthy
    restart: unless-stopped

  # ── Day08 News RAG Agent ──────────────────────────────────────
  day08-news-rag:
    build: .
    command: ["python", "-m", "Lab_Assigment.day08_news_rag_agent"]
    ports:
      - "11013:11013"
    environment:
      - DAY08_NEWS_RAG_AGENT_PORT=11013
      - DAY08_REGISTRY_URL=http://day08-registry:11000
    env_file:
      - path: .env.local
        required: false
    depends_on:
      day08-registry:
        condition: service_healthy
    restart: unless-stopped

  # ── Day08 Orchestrator Agent ──────────────────────────────────
  day08-orchestrator:
    build: .
    command: ["python", "-m", "Lab_Assigment.day08_orchestrator_agent"]
    ports:
      - "11011:11011"
    environment:
      - DAY08_ORCHESTRATOR_AGENT_PORT=11011
      - DAY08_REGISTRY_URL=http://day08-registry:11000
    env_file:
      - path: .env.local
        required: false
    depends_on:
      day08-registry:
        condition: service_healthy
    restart: unless-stopped

  # ── Day08 Customer Agent ──────────────────────────────────────
  day08-customer:
    build: .
    command: ["python", "-m", "Lab_Assigment.day08_customer_agent"]
    ports:
      - "11010:11010"
    environment:
      - DAY08_CUSTOMER_AGENT_PORT=11010
      - DAY08_REGISTRY_URL=http://day08-registry:11000
    env_file:
      - path: .env.local
        required: false
    depends_on:
      day08-registry:
        condition: service_healthy
      day08-orchestrator:
        condition: service_started
    restart: unless-stopped

  # ── Day08 Web UI ──────────────────────────────────────────────
  day08-ui:
    build: .
    command: ["python", "-m", "Lab_Assigment.day08_ui"]
    ports:
      - "11014:11014"
    environment:
      - DAY08_UI_PORT=11014
      - DAY08_REGISTRY_URL=http://day08-registry:11000
      - DAY08_CUSTOMER_AGENT_URL=http://day08-customer:11010
      - DAY08_ORCHESTRATOR_AGENT_URL=http://day08-orchestrator:11011
      - DAY08_LEGAL_RAG_AGENT_URL=http://day08-legal-rag:11012
      - DAY08_NEWS_RAG_AGENT_URL=http://day08-news-rag:11013
    env_file:
      - path: .env.local
        required: false
    depends_on:
      - day08-customer
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:11014/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ── Production API Gateway (FastAPI + auth + rate limit) ──────
  agent:
    build: .
    command: ["sh", "-c", "uvicorn Lab_Assigment.app.main:app --host 0.0.0.0 --port ${PORT:-8000} --workers ${WEB_CONCURRENCY:-2}"]
    expose:
      - "8000"
    environment:
      - ENVIRONMENT=staging
      - APP_NAME=Legal RAG Production API
      - REDIS_URL=redis://redis:6379/0
      - RATE_LIMIT_PER_MINUTE=10
      - MONTHLY_BUDGET_USD=10.0
    env_file:
      - path: .env.local
        required: false
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    stop_grace_period: 30s
    restart: unless-stopped

  # ── Nginx (API gateway load balancer) ─────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8000:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - agent
    restart: unless-stopped

volumes:
  redis-data:
