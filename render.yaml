services:
  - type: web
    name: ai-agent-production
    runtime: docker
    rootDir: 06-lab-complete
    region: singapore
    plan: starter
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: APP_VERSION
        value: "1.0.0"
      - key: LOG_LEVEL
        value: INFO
      - key: REDIS_URL
        fromService:
          name: ai-agent-redis
          type: redis
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: AGENT_API_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: MONTHLY_BUDGET_USD
        value: "10.0"
      - key: RATE_LIMIT_PER_MINUTE
        value: "10"

  - type: redis
    name: ai-agent-redis
    region: singapore
    plan: starter
    ipAllowList: []
