services:
  # ── Production API Gateway (FastAPI + auth + rate limit) ──────
  - type: web
    name: legal-rag-api-gateway
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: singapore
    plan: starter
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: APP_NAME
        value: Legal RAG Multiagent System
      - key: APP_VERSION
        value: "1.0.0"
      - key: LOG_LEVEL
        value: INFO
      - key: PORT
        value: "8000"
      - key: REDIS_URL
        fromService:
          name: legal-rag-redis
          type: redis
          property: connectionString
      - key: OPENROUTER_API_KEY
        sync: false
      - key: AGENT_API_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: MONTHLY_BUDGET_USD
        value: "10.0"
      - key: RATE_LIMIT_PER_MINUTE
        value: "10"
      - key: DAY08_DISABLE_LLM
        value: "false"
    dockerCommand: sh -c 'uvicorn Lab_Assigment.app.main:app --host 0.0.0.0 --port ${PORT:-8000} --workers 2'

  # ── Day08 Web UI ──────────────────────────────────────────────
  - type: web
    name: legal-rag-ui
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: singapore
    plan: starter
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DAY08_UI_PORT
        value: "11014"
      - key: PORT
        value: "11014"
      - key: DAY08_REGISTRY_URL
        fromService:
          name: legal-rag-registry
          type: web
          property: host
      - key: OPENROUTER_API_KEY
        sync: false
      - key: DAY08_DISABLE_LLM
        value: "false"
    dockerCommand: python -m Lab_Assigment.day08_ui

  # ── Redis ─────────────────────────────────────────────────────
  - type: redis
    name: legal-rag-redis
    region: singapore
    plan: starter
    ipAllowList: []
